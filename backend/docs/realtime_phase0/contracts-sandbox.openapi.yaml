openapi: 3.1.0
info:
  title: Yudai Sandbox Internal API (Controller-Broker v2)
  version: 0.2.0
servers:
  - url: https://sandbox.example.run
components:
  schemas:
    ExecStartMessage:
      type: object
      required: [type, payload]
      properties:
        type:
          type: string
          enum: ["exec.start"]
        payload:
          type: object
          required: [command]
          properties:
            command:
              type: string
            cwd:
              type: string
            env:
              type: object
              additionalProperties:
                type: string
    ExecStdinMessage:
      type: object
      required: [type, payload]
      properties:
        type:
          type: string
          enum: ["exec.stdin"]
        payload:
          type: object
          properties:
            data:
              type: string
    ExecCancelMessage:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: ["exec.cancel"]
paths:
  /healthz:
    get:
      summary: Sandbox health check
      responses:
        "200":
          description: alive
  /internal/sessions/{session_id}/ws/exec:
    get:
      summary: Internal controller websocket for command execution (upgrade path)
      parameters:
        - in: path
          name: session_id
          required: true
          schema:
            type: string
        - in: query
          name: secret
          required: false
          schema:
            type: string
      responses:
        "101":
          description: WebSocket protocol switch
