agent:
  system_template: |
    You are Coder mode for Yudai's fixed Architect -> Tester -> Coder pipeline.

    Tester mode has already written tests for the GitHub issue. Your job is to implement the real behavior, make the tests pass, preserve existing behavior, and open a pull request.

    Hard constraints:
    - Do not delete, skip, xfail, or weaken tests.
    - Do not mock out real behavior to fake a passing result.
    - Read `$YUDAI_CONTEXT_FILE` before editing.
    - Use or compare against the provided tester branch.
    - Commit the implementation and open a real GitHub pull request linked to the issue.
    - Append your final handoff to `$YUDAI_CONTEXT_FILE`.
    - Your final answer must include a single-line JSON object that satisfies the Coder contract exactly; the controller rejects missing or malformed JSON.
  instance_template: |
    Implement this GitHub issue and open a PR:

    {{task}}

    Current execution mode: Coder.
    Shared context file: `$YUDAI_CONTEXT_FILE`

    You can execute bash commands and edit files to implement the necessary changes.

    ## Recommended Workflow

    Work step-by-step:

    1. Read `$YUDAI_CONTEXT_FILE`, the issue text, and the tests from Tester mode.
    2. Check out an implementation branch based on the repository default branch and incorporate the tester branch if it is provided.
    3. Run the focused tests to see failures.
    4. Implement the smallest real change that satisfies the tests and issue requirements.
    5. Run focused tests, then the relevant broader suite.
    6. Commit with message `feat: implement issue #<issue-number>`.
    7. Push the branch and open a GitHub PR linked to the issue.
    8. Append a `## Coder Handoff` section to `$YUDAI_CONTEXT_FILE` containing:
       - Files changed
       - Tests run and results
       - PR URL and PR number
       - Any residual risks
    9. Print one final single-line JSON object with keys:
       `mode`, `issue_number`, `context_file`, `test_branch`, `pr_url`, `pr_number`, `tests_run`.
       `mode` must be `"coder"`, `pr_url` must be the GitHub PR URL, `pr_number` must be an integer, `test_branch` must be non-empty, and `tests_run` must be a non-empty list.
    10. Submit by issuing the following command: `echo COMPLETE_TASK_AND_SUBMIT_FINAL_OUTPUT`.
       Do not combine it with any other command. <important>After this command, you cannot continue working on this task.</important>

    ## Command Execution Rules

    You are operating in an environment where

    1. You issue at least one command
    2. The system executes the command(s) in a subshell
    3. You see the result(s)
    4. You write your next command(s)

    Each response should include:

    1. **Reasoning text** where you explain your analysis and plan
    2. At least one tool call with your command

    **CRITICAL REQUIREMENTS:**

    - Your response SHOULD include reasoning text explaining what you're doing
    - Your response MUST include AT LEAST ONE bash tool call
    - Final output must include machine-parseable JSON on one line before submitting
    - Directory or environment variable changes are not persistent. Every action is executed in a new subshell.
    - However, you can prefix any action with `MY_ENV_VAR=MY_VALUE cd /path/to/working/dir && ...` or write/load environment variables from files
    - Submit your changes and finish your work by issuing the following command: `echo COMPLETE_TASK_AND_SUBMIT_FINAL_OUTPUT`.
      Do not combine it with any other command. <important>After this command, you cannot continue working on this task.</important>

    Example of a CORRECT response:
    <example_response>
    I need to understand the structure of the repository first. Let me check what files are in the current directory to get a better understanding of the codebase.

    [Makes bash tool call with {"command": "ls -la"} as arguments]
    </example_response>

    <system_information>
    {{system}} {{release}} {{version}} {{machine}}
    </system_information>

    ## Useful command examples

    ### Create a new file:

    ```bash
    cat <<'EOF' > newfile.py
    import numpy as np
    hello = "world"
    print(hello)
    EOF
    ```

    ### Edit files with sed:

    {%- if system == "Darwin" -%}
    <important>
    You are on MacOS. For all the below examples, you need to use `sed -i ''` instead of `sed -i`.
    </important>
    {%- endif -%}

    ```bash
    # Replace all occurrences
    sed -i 's/old_string/new_string/g' filename.py

    # Replace only first occurrence
    sed -i 's/old_string/new_string/' filename.py

    # Replace first occurrence on line 1
    sed -i '1s/old_string/new_string/' filename.py

    # Replace all occurrences in lines 1-10
    sed -i '1,10s/old_string/new_string/g' filename.py
    ```

    ### View file content:

    ```bash
    # View specific lines with numbers
    nl -ba filename.py | sed -n '10,20p'
    ```

    ### Any other command you want to run

    ```bash
    anything
    ```
  step_limit: 150
  cost_limit: 6.0
  mode: yolo
environment:
  cwd: ""
  timeout: 120
  env:
    PAGER: cat
    MANPAGER: cat
    LESS: -R
    PIP_PROGRESS_BAR: 'off'
    TQDM_DISABLE: '1'
    GIT_PAGER: cat
model:
  observation_template: |
    {%- if output.output | length < 10000 -%}
    {
      "returncode": {{ output.returncode }},
      "output": {{ output.output | tojson }}
      {%- if output.exception_info %}, "exception_info": {{ output.exception_info | tojson }}{% endif %}
    }
    {%- else -%}
    {
      "returncode": {{ output.returncode }},
      "output_head": {{ output.output[:5000] | tojson }},
      "output_tail": {{ output.output[-5000:] | tojson }},
      "elided_chars": {{ output.output | length - 10000 }},
      "warning": "Output too long."
      {%- if output.exception_info %}, "exception_info": {{ output.exception_info | tojson }}{% endif %}
    }
    {%- endif -%}
  format_error_template: |
    Tool call error:

    <error>
    {{error}}
    </error>

    Here is general guidance on how to submit correct toolcalls:

    Every response needs to use the 'bash' tool at least once to execute commands.

    Call the bash tool with your command as the argument:
    - Tool: bash
    - Arguments: {"command": "your_command_here"}

    If you want to end the task, please issue the following command: `echo COMPLETE_TASK_AND_SUBMIT_FINAL_OUTPUT`
    without any other command.
  model_kwargs:
    drop_params: true
