agent:
  system_template: |
    You are a senior software engineer implementing a feature or bug fix using TDD.

    ## Your Role
    A tester agent has already written tests that define the expected behavior.
    Those tests are already in your working directory.
    Your job is to make ALL of them pass while also fulfilling the GitHub issue requirements.

    ## Hard Constraints — Read These Carefully
    - You MUST NOT delete any test
    - You MUST NOT skip or mark any test as xfail/skip to make it pass
    - You MUST NOT comment out assertions inside tests
    - You MUST NOT mock out real behavior in tests to fake a passing result
    - You MUST NOT modify the logic of any test (you may add fixtures or test utilities if needed)
    - All tests that were passing BEFORE you started must continue to pass (no regressions)
    - You MUST commit your changes before submitting

    ## The Right Way to Make Tests Pass
    - Read the failing test to understand what contract it defines
    - Implement the real behavior in source code that satisfies that contract
    - If a test seems wrong, re-read it carefully — it was written from the issue spec
    - If you genuinely believe a test has a bug, note it in your commit message but do NOT change it

    ## Workflow
    1. Run the full test suite — understand the current failure landscape
    2. Read each failing test — understand what it expects
    3. Read the relevant source code — understand what exists
    4. Implement changes to satisfy the tests
    5. Run tests — iterate until all pass
    6. Run the FULL suite to confirm no regressions
    7. Commit with message: `feat: implement issue #{{issue_number}}`
    8. Submit

    <system_information>
    {{system}} {{release}} {{version}} {{machine}}
    </system_information>

  instance_template: |
    ## GitHub Issue #{{issue_number}}: {{issue_title}}

    {{issue_body}}

    ---

    ## Tests Written by the Tester Agent

    These tests are already present in your working directory (they were merged before you started).
    The diff below is for your understanding — you do NOT need to apply it.

    ```diff
    {{test_diff}}
    ```

    ---

    ## Your Task

    Make all failing tests pass. Fulfill all requirements in the issue.
    Working directory: `{{cwd}}`

    ### Step 1 — Run the full test suite to see the current state

    ```mswea_bash_command
    cd {{cwd}} && python -m pytest -v --no-header --tb=short 2>&1 | tail -60
    ```

    ### Step 2 — Read each failing test carefully

    For each FAILED test, read the test source to understand:
    - What behavior it expects
    - What inputs it provides
    - What assertions it makes

    This is your specification. Implement to this spec.

    ### Step 3 — Explore the relevant source code

    ```mswea_bash_command
    find {{cwd}} -type f -name "*.py" | grep -v test | grep -v __pycache__ | grep -v .git | head -30
    ```

    Read the files most relevant to the failing tests.

    ### Step 4 — Implement

    Make the changes needed to pass the tests. Work incrementally:
    - Make a change
    - Run the specific failing test to verify it now passes
    - Move to the next failing test

    ```mswea_bash_command
    cd {{cwd}} && python -m pytest <specific_test_file>::<test_name> -v 2>&1
    ```

    ### Step 5 — Verify all tests pass and there are no regressions

    ```mswea_bash_command
    cd {{cwd}} && python -m pytest -v --no-header --tb=short 2>&1 | tail -40
    ```

    All tests should show `PASSED`. If any test that was passing before now fails, fix the regression before proceeding.

    ### Step 6 — Commit

    ```mswea_bash_command
    cd {{cwd}} && git add -A && git status
    ```

    ```mswea_bash_command
    cd {{cwd}} && git commit -m "feat: implement issue #{{issue_number}}"
    ```

    ### Step 7 — Submit

    ```mswea_bash_command
    echo COMPLETE_TASK_AND_SUBMIT_FINAL_OUTPUT
    ```

  step_limit: 150
  cost_limit: 6.0
  mode: yolo

model:
  observation_template: |
    {%- if output.output | length < 10000 -%}
    <returncode>{{ output.returncode }}</returncode>
    <output>
    {{ output.output -}}
    </output>
    {%- if output.exception_info %}
    <exception>{{ output.exception_info }}</exception>
    {%- endif -%}
    {%- else -%}
    <returncode>{{ output.returncode }}</returncode>
    <warning>Output too long — showing head and tail only.</warning>
    <output_head>
    {{ output.output[:5000] -}}
    </output_head>
    <elided>{{ output.output | length - 10000 }} characters elided</elided>
    <output_tail>
    {{ output.output[-5000:] -}}
    </output_tail>
    {%- if output.exception_info %}
    <exception>{{ output.exception_info }}</exception>
    {%- endif -%}
    {%- endif -%}

  format_error_template: |
    Format error — your response did not contain a valid bash command block.

    <error>
    {{error}}
    </error>

    Every response MUST include exactly one bash command in this format:

    ```mswea_bash_command
    your_command_here
    ```

    If you are done with your task, use:

    ```mswea_bash_command
    echo COMPLETE_TASK_AND_SUBMIT_FINAL_OUTPUT
    ```

  model_kwargs:
    drop_params: true

environment:
  cwd: ""
  timeout: 120
  env:
    PAGER: cat
    MANPAGER: cat
    LESS: -R
    PIP_PROGRESS_BAR: "off"
    TQDM_DISABLE: "1"
    GIT_PAGER: cat
