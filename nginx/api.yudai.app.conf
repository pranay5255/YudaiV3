# ===========================================
# YudaiV3 Backend Nginx Configuration
# Production reverse proxy with SSL
# ===========================================
# 
# Usage:
#   1. Copy to /etc/nginx/sites-available/api.yudai.app
#   2. Edit BACKEND_DOMAIN and FRONTEND_DOMAIN placeholders
#   3. ln -s /etc/nginx/sites-available/api.yudai.app /etc/nginx/sites-enabled/
#   4. certbot --nginx -d api.yudai.app
#   5. nginx -t && systemctl reload nginx
#
# ===========================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Upstream for backend (Docker Compose)
upstream backend_upstream {
    server 127.0.0.1:8000;
    keepalive 32;
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name BACKEND_DOMAIN;
    
    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name BACKEND_DOMAIN;
    
    # SSL Configuration (configure after certbot)
    ssl_certificate /etc/letsencrypt/live/BACKEND_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/BACKEND_DOMAIN/privkey.pem;
    
    # Modern SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # CORS headers for frontend domain
    set $cors_origin "https://FRONTEND_DOMAIN";
    
    # Handle preflight requests
    if ($request_method = 'OPTIONS') {
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With, X-Session-Id, Cache-Control" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Max-Age "86400" always;
        add_header Content-Length 0;
        add_header Content-Type "text/plain; charset=utf-8";
        return 204;
    }
    
    # Add CORS headers to all responses
    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With, X-Session-Id, Cache-Control" always;
    add_header Access-Control-Allow-Credentials "true" always;
    
    # Rate limiting
    limit_req zone=api_limit burst=50 nodelay;
    limit_conn conn_limit 20;
    
    # Increase buffer sizes for large requests
    client_body_buffer_size 128k;
    client_max_body_size 100m;
    large_client_header_buffers 4 32k;
    
    # Proxy settings
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;
    
    # Connection reuse
    proxy_set_header Connection "";
    
    # WebSocket support
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
    
    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    
    # Buffer settings
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 32k;
    
    # Health check endpoint (no rate limiting)
    location /health {
        proxy_pass http://backend_upstream;
        access_log off;
        limit_req off;
        limit_conn off;
    }
    
    # WebSocket endpoint (long timeouts)
    location ~ ^/controller/sessions/.*/ws/ {
        proxy_pass http://backend_upstream;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        limit_req off;
    }
    
    # SSE/streaming endpoints (no buffering)
    location ~ ^/.*/(stream|sse)/ {
        proxy_pass http://backend_upstream;
        proxy_buffering off;
        proxy_cache off;
        limit_req off;
    }
    
    # All other API routes
    location / {
        proxy_pass http://backend_upstream;
    }
    
    # Logging
    access_log /var/log/nginx/yudai-api.access.log combined;
    error_log /var/log/nginx/yudai-api.error.log warn;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types application/json application/javascript text/plain text/css text/xml application/xml;
    gzip_comp_level 4;
}

# ===========================================
# Replace placeholders before use:
#   BACKEND_DOMAIN -> api.yudai.app
#   FRONTEND_DOMAIN -> yudai.app
# ===========================================