name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  api-contract:
    name: API Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/package-lock.json

      - run: npm ci
        working-directory: src

      - run: npm run codegen:check
        working-directory: src

      - run: npm run typecheck:contract
        working-directory: src

  backend:
    name: Backend (Server / backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest tests/ -v

  frontend:
    name: Frontend (React / Vercel)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/package-lock.json

      - run: npm ci

      - name: Test
        run: npm test

      - name: Typecheck app
        run: npx tsc --project tsconfig.app.json --noEmit

      - name: Typecheck Vercel middleware
        run: npx tsc --project tsconfig.node.json --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  real-site-e2e:
    name: Real Site E2E (Playwright)
    runs-on: ubuntu-latest
    needs: frontend
    if: ${{ github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) }}
    defaults:
      run:
        working-directory: src
    env:
      PLAYWRIGHT_BASE_URL: ${{ vars.PLAYWRIGHT_BASE_URL || 'https://yudai.app' }}
      E2E_SESSION_TOKEN: ${{ secrets.E2E_SESSION_TOKEN }}
      E2E_USER_ID: ${{ vars.E2E_USER_ID }}
      E2E_USERNAME: ${{ vars.E2E_USERNAME }}
      E2E_USER_DISPLAY_NAME: ${{ vars.E2E_USER_DISPLAY_NAME }}
      E2E_USER_EMAIL: ${{ vars.E2E_USER_EMAIL }}
      E2E_REPO_OWNER: ${{ vars.E2E_REPO_OWNER }}
      E2E_REPO_NAME: ${{ vars.E2E_REPO_NAME }}
      E2E_REPO_BRANCH: ${{ vars.E2E_REPO_BRANCH }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/package-lock.json

      - run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run real-site Playwright gate
        run: npm run test:e2e

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: real-site-e2e-artifacts
          path: |
            src/playwright-report
            src/test-results
          retention-days: 7
