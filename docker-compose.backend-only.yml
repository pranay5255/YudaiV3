# ===========================================
# PRODUCTION DOCKER COMPOSE - BACKEND ONLY
# Version: v2.0.0 (Controller Architecture)
# ===========================================

x-backend-build: &backend-build
  context: ./backend
  dockerfile: Dockerfile

services:
  # Modal sandbox provisioning + exec smoke test.
  modal-preflight:
    profiles:
      - modal
    build: *backend-build
    image: yudai-backend:local
    restart: "no"
    env_file:
      - ./backend/.env.prod
    environment:
      - DOCKER_COMPOSE=true
      - PYTHONPATH=/app
    command: ["python", "-m", "yudai.realtime.modal_preflight"]
    networks:
      - yudai-network
    security_opt:
      - no-new-privileges:true

  # Backend API Service
  backend:
    build: *backend-build
    image: yudai-backend:local
    container_name: yudai-be
    restart: unless-stopped
    # Load all env vars from backend/.env.prod
    env_file:
      - ./backend/.env.prod
    environment:
      # Ensure Docker-specific settings
      - DOCKER_COMPOSE=true
      - PYTHONPATH=/app
      # Realtime/cache directories must be writable by appuser in-container
      - SANDBOX_GIT_ROOT=/tmp/sandbox_repos
      - SANDBOX_CACHE_ROOT=/tmp/sandbox_cache
      - SANDBOX_ARTIFACT_ROOT=/data/sandbox_artifacts
      - SANDBOX_TUNNEL_TEMPLATE
      - REALTIME_MODAL_PROVISIONING_ENABLED
      - REALTIME_WS_UNIFIED_ENABLED
      - CONTROLLER_INTERNAL_WS_SECRET=${CONTROLLER_INTERNAL_WS_SECRET:-local-dev-secret}
      - CONTROLLER_HEARTBEAT_SECRET=${CONTROLLER_HEARTBEAT_SECRET:-local-heartbeat-secret}
      # Disabled by default. Manual backend-only tests export this as true.
      - YUDAI_TEST_API_ENABLED=${YUDAI_TEST_API_ENABLED:-false}
      - YUDAI_TEST_FAKE_LLM=${YUDAI_TEST_FAKE_LLM:-false}
      - YUDAI_TEST_FAKE_MSWEA=${YUDAI_TEST_FAKE_MSWEA:-false}
    ports:
      - "${PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_logs:/app/logs
      - ./backend/yudaiv3.2025-09-07.private-key.pem:/app/yudaiv3.2025-09-07.private-key.pem:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - swe_runs:/data/swe_runs
      - sandbox_artifacts:/data/sandbox_artifacts
      - transformers_cache:/tmp/transformers_cache
      - huggingface_cache:/tmp/huggingface_cache
    tmpfs:
      - /tmp/github_context_cache:mode=1777
    networks:
      - yudai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=backend,version=v2.0.0"
    security_opt:
      - no-new-privileges:true

  # Local sandbox-session server for backend-only websocket/manual testing.
  sandbox-dev:
    profiles:
      - local-sandbox
    build: *backend-build
    image: yudai-backend:local
    container_name: yudai-sandbox-dev
    restart: unless-stopped
    env_file:
      - ./backend/.env.prod
    environment:
      - DOCKER_COMPOSE=true
      - PYTHONPATH=/app
      - PORT=8100
      - SANDBOX_ID=local-sandbox
      - CONTROLLER_BASE_URL=http://backend:8000
      - REALTIME_WORKSPACE_PATH=/workspace/repo
      - WORKSPACE_PATH=/workspace/repo
      - SANDBOX_CACHE_ROOT=/tmp/sandbox_cache
      - SANDBOX_ARTIFACT_ROOT=/data/sandbox_artifacts
      - CONTROLLER_INTERNAL_WS_SECRET=${CONTROLLER_INTERNAL_WS_SECRET:-local-dev-secret}
      - CONTROLLER_HEARTBEAT_SECRET=${CONTROLLER_HEARTBEAT_SECRET:-local-heartbeat-secret}
    command: ["python", "-m", "yudai.run_sandbox_server"]
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - sandbox_workspace:/workspace/repo
      - sandbox_artifacts:/data/sandbox_artifacts
    networks:
      - yudai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    security_opt:
      - no-new-privileges:true

  # PostgreSQL Database (included for local deployment)
  db:
    build:
      context: ./backend/yudai/db
      dockerfile: Dockerfile
    image: yudai-db:local
    container_name: yudai-db
    restart: unless-stopped
    env_file:
      - ./backend/.env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/yudai/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - yudai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-yudai_user} -d ${POSTGRES_DB:-yudai_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
  app_logs:
    driver: local
  swe_runs:
    driver: local
  sandbox_artifacts:
    driver: local
  transformers_cache:
    driver: local
  huggingface_cache:
    driver: local
  sandbox_workspace:
    driver: local

networks:
  yudai-network:
    driver: bridge
