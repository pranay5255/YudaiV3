# ===========================================
# PRODUCTION DOCKER COMPOSE - BACKEND ONLY
# Version: v2.0.0 (Controller Architecture)
# ===========================================

x-backend-build: &backend-build
  context: ./backend
  dockerfile: Dockerfile

services:
  # Modal sandbox provisioning + exec smoke test.
  modal-preflight:
    build: *backend-build
    image: yudai-backend:local
    restart: "no"
    env_file:
      - ./backend/.env.prod
    environment:
      - DOCKER_COMPOSE=true
      - PYTHONPATH=/app
    command: ["python", "-m", "realtime.modal_preflight"]
    networks:
      - yudai-network
    security_opt:
      - no-new-privileges:true

  # Backend API Service
  backend:
    build: *backend-build
    image: yudai-backend:local
    container_name: yudai-be
    restart: unless-stopped
    # Load all env vars from backend/.env.prod
    env_file:
      - ./backend/.env.prod
    environment:
      # Ensure Docker-specific settings
      - DOCKER_COMPOSE=true
      - PYTHONPATH=/app
      # Realtime/cache directories must be writable by appuser in-container
      - SANDBOX_GIT_ROOT=/tmp/sandbox_repos
      - SANDBOX_CACHE_ROOT=/tmp/sandbox_cache
      - SANDBOX_ARTIFACT_ROOT=/data/sandbox_artifacts
    ports:
      - "${PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      modal-preflight:
        condition: service_completed_successfully
    volumes:
      - app_logs:/app/logs
      - ./backend/yudaiv3.2025-09-07.private-key.pem:/app/yudaiv3.2025-09-07.private-key.pem:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - swe_runs:/data/swe_runs
      - sandbox_artifacts:/data/sandbox_artifacts
      - transformers_cache:/tmp/transformers_cache
      - huggingface_cache:/tmp/huggingface_cache
    tmpfs:
      - /tmp/github_context_cache:mode=1777
    networks:
      - yudai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=backend,version=v2.0.0"
    security_opt:
      - no-new-privileges:true

  # PostgreSQL Database (included for local deployment)
  db:
    image: postgres:15
    container_name: yudai-db
    restart: unless-stopped
    env_file:
      - ./backend/.env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - yudai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-yudai_user} -d ${POSTGRES_DB:-yudai_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
  app_logs:
    driver: local
  swe_runs:
    driver: local
  sandbox_artifacts:
    driver: local
  transformers_cache:
    driver: local
  huggingface_cache:
    driver: local

networks:
  yudai-network:
    driver: bridge
